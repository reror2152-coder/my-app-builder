name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'اكتب اسم التطبيق هنا'
        required: true
        default: 'MyApp'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create my-app com.example.myapp "${{ github.event.inputs.app_name }}"
          cd my-app
          cordova platform add android
          rm -rf www/*
          cp -r ../index.html ../script.js ../style.css www/ || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd my-app
          cordova build android --device --debug

      - name: Copy APK to Root
        run: |
          cp my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk ./${{ github.event.inputs.app_name }}.apk

      - name: Commit and Push APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.apk
          git commit -m "إضافة ملف APK المسمى ${{ github.event.inputs.app_name }}"
          git push
